apiVersion: v1
kind: Pod
metadata:
  name: hello-server
  labels:
    app: hello
spec:
  containers:
    - name: python-server
      image: python:3.11-slim
      command: ["python", "-m", "http.server", "8080"]
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-server
spec:
  type: NodePort
  selector:
    app: hello
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
